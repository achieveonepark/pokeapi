name: Deploy Pokedex Client to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'pokedex-client/**'
      - '.github/workflows/pokedex-client-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-flight ones finish rather than
# cancelling, since a cancelled deploy can leave Pages serving a half-updated
# build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokedex-client
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: pokedex-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (served under /pokeapi/)
        run: npm run build
        env:
          VITE_BASE_PATH: /pokeapi/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type: GitHub Actions) if it isn't
          # already, instead of requiring a manual Settings -> Pages step.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pokedex-client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
